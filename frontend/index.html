<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DoroTracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand-mark" href="#home" aria-label="DoroTracker home">
          <img class="brand-logo-image" src="./assets/dorotracker-logo.png" alt="DoroTracker logo" />
        </a>
        <div class="site-time-card" aria-live="polite">
          <span class="site-time-label">Current time</span>
          <strong id="site-time">--:-- --</strong>
          <span class="site-time-date" id="site-date">Loading date...</span>
        </div>
        <nav class="top-nav" aria-label="Primary">
          <a href="#home">Home</a>
          <a href="#scheduler">Scheduler</a>
          <a href="#assignments">Assignments</a>
          <a href="#timer">Pomodoro</a>
          <a href="#auth">Account</a>
        </nav>
      </header>

      <main id="app"></main>
    </div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
